name: Bug report
description: Report a reproducible problem in sonosctl
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please include concrete steps and command output.
  - type: input
    id: version
    attributes:
      label: sonosctl version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.11.0
    validations:
      required: true
  - type: input
    id: speaker
    attributes:
      label: Target speaker
      placeholder: Living Room
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / error output
    validations:
      required: true
